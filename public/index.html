<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>K6 Load Tester</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="styles.css">
</head>
<body>

  <!-- HEADER -->
  <header class="header">
    <div class="header-left">
      <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" class="logo-bolt"><path d="M13 2L3 14h9l-1 8 10-12h-9l1-8z"/></svg>
      <span class="header-title">K6 Load Tester</span>
    </div>
    <div class="status-pill" id="statusPill">
      <span class="status-dot"></span>
      <span id="statusText">Idle</span>
    </div>
  </header>

  <div id="authTokenBar" class="auth-token-bar hidden" aria-live="polite">
    <div class="auth-token-inner">
      <label class="auth-token-label" for="inputAccessToken">Access token</label>
      <input id="inputAccessToken" type="text" autocomplete="off" spellcheck="false" placeholder="Paste APP_ACCESS_TOKEN">
      <button type="button" id="btnSaveToken" class="btn btn-token">Save</button>
    </div>
  </div>

  <!-- CONTENT -->
  <div class="content">

    <!-- LEFT: CONFIG -->
    <aside class="panel config-panel">

      <!-- Scenario pills -->
      <div class="mode-toggle" role="radiogroup" aria-label="Test scenario">
        <label class="mode-option">
          <input type="radio" name="scenario" value="http" class="mode-radio" checked>
          <span class="mode-btn">HTTP</span>
        </label>
        <label class="mode-option">
          <input type="radio" name="scenario" value="browser" class="mode-radio">
          <span class="mode-btn">Browser</span>
        </label>
        <label class="mode-option hidden" id="modeCustomWrap">
          <input type="radio" name="scenario" value="custom" class="mode-radio">
          <span class="mode-btn">Custom</span>
        </label>
      </div>

      <!-- Script badge -->
      <div class="script-badge" aria-live="polite">
        <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><polyline points="16 18 22 12 16 6"/><polyline points="8 6 2 12 8 18"/></svg>
        <code id="scriptName">test.js</code>
      </div>

      <div id="browserPresetRow" class="browser-preset-row hidden">
        <label class="field-label field-label-first" for="browserPreset">Site</label>
        <select id="browserPreset" aria-label="Preset test site">
          <option value="">Custom URL (type below)</option>
          <option value="https://bolt-fifth-testing.netlify.app/">Bolt · Fifth (Netlify)</option>
          <option value="https://bolt-sixth-testing.netlify.app/">Weather · Sixth (Netlify)</option>
          <option value="https://weather-app-us-28149829298.us-central1.run.app">Weather · US (Cloud Run)</option>
          <option value="https://weather-app-ca-28149829298.northamerica-northeast2.run.app">Weather · CA (Cloud Run)</option>
        </select>
      </div>

      <!-- URL -->
      <label class="field-label" for="inputUrl">URL</label>
      <div class="url-row">
        <input id="inputUrl" type="url" placeholder="https://example.com" spellcheck="false" autocomplete="off">
      </div>

      <!-- VUs + Duration -->
      <div class="row-2">
        <div>
          <label class="field-label" for="inputVUs">VUs</label>
          <input id="inputVUs" type="number" value="100" min="1" max="50000">
        </div>
        <div>
          <label class="field-label" for="inputDuration">Duration</label>
          <select id="inputDuration">
            <option value="30s">30 s</option>
            <option value="45s">45 s</option>
            <option value="60s">60 s</option>
            <option value="90s">90 s</option>
            <option value="1m">1 min</option>
            <option value="3m">3 min</option>
            <option value="5m" selected>5 min</option>
            <option value="10m">10 min</option>
            <option value="15m">15 min</option>
            <option value="30m">30 min</option>
          </select>
        </div>
      </div>

      <!-- Actions -->
      <div class="btn-row">
        <button id="btnStart" class="btn btn-start">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="currentColor"><polygon points="5 3 19 12 5 21 5 3"/></svg>
          Run
        </button>
        <button id="btnStop" class="btn btn-stop" disabled>
          <svg width="14" height="14" viewBox="0 0 24 24" fill="currentColor"><rect x="3" y="3" width="18" height="18" rx="2"/></svg>
          Stop
        </button>
      </div>

      <!-- Stats -->
      <div class="stats">
        <div class="stat"><span class="stat-val" id="sVUs">0</span><span class="stat-lbl">VUs</span></div>
        <div class="stat"><span class="stat-val" id="sReqs">0</span><span class="stat-lbl" id="sReqsLbl">Requests</span></div>
        <div class="stat"><span class="stat-val" id="sTime">0s</span><span class="stat-lbl">Elapsed</span></div>
      </div>
    </aside>

    <!-- RIGHT: CONSOLE -->
    <section class="panel console-panel">
      <div class="console-top">
        <h2>Output</h2>
        <button id="btnClear" class="btn-icon" title="Clear">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="3 6 5 6 21 6"/><path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"/></svg>
        </button>
      </div>
      <div class="console" id="console">
        <p class="console-empty">Output appears here when a test starts.</p>
      </div>
    </section>

  </div>

  <script src="app.js?v=6"></script>
</body>
</html>
